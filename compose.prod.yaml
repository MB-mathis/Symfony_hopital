---
services:
  php:
    build:
      context: .
      target: frankenphp_prod

    env_file:
      - .env.prod

    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET}

      SERVER_NAME: ${SERVER_NAME}

      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}

    ports:
      - "80:80"
      - "443:443"

  database:
    env_file:
      - .env.prod

  phpmyadmin:
    profiles:
      - dev